name: Cloudflare IP Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'generate.py'
      - 'requirements.txt'
      - '.github/workflows/*.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: 检出源码
        uses: actions/checkout@v5

      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖（锁定版本）
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas==2.2.2 requests==2.32.3 PyYAML==6.0.1
          fi

      - name: 运行 IP 优选脚本
        id: run_script
        run: python generate.py
        continue-on-error: true

      - name: 生成 V2RayN + Clash 双格式订阅（VLESS版）
        if: steps.run_script.outcome == 'success'
        run: |
          python3 << 'EOF'
          import pandas as pd
          import base64
          import yaml
          from urllib.parse import quote

          # 读取你的CSV文件
          df = pd.read_csv('result.csv')

          # ========== 完全适配你的CSV结构的配置区 ==========
          IP_COL_INDEX = 0          # IP地址列索引
          COUNTRY_COL_INDEX = 4     # 国家归属列索引（CF归属国）
          DELAY_COL_INDEX = 7       # 延迟列索引（TLS延迟(ms)，和你的节点TLS配置匹配）
          SPEED_COL_INDEX = 3       # 速度列索引（速度(Mbps)）
          OUTPUT_COUNT = 20          # 输出节点数量
          # 你的节点固定参数
          UUID = "0c6857dd-cd86-4e02-870b-2f862baf016e"
          PORT = 443
          ENCRYPTION = "none"
          ENABLE_TLS = True
          HOST = "xiemenghan0201.ccwu.cc"
          WS_PATH = "/"
          TLS_FINGERPRINT = "chrome"
          REMARK_PREFIX = "CF优选_"
          # =====================================================

          # 1. 过滤有效节点：延迟>0、速度>0，剔除测速失败的IP
          df_valid = df[(df.iloc[:, DELAY_COL_INDEX] > 0) & (df.iloc[:, SPEED_COL_INDEX] > 0)]
          # 2. 排序：优先按速度降序（速度最快），再按延迟升序（延迟最低），拿到最优IP
          df_sorted = df_valid.sort_values(by=[SPEED_COL_INDEX, DELAY_COL_INDEX], ascending=[False, True])
          # 3. 取前20个最优节点
          df_top = df_sorted.head(OUTPUT_COUNT)
          top_ips = df_top.iloc[:, IP_COL_INDEX].astype(str).tolist()

          # 空数据兜底：无有效IP时优雅退出
          if len(top_ips) == 0:
              print("无有效测速节点，跳过订阅生成")
              exit(0)

          # 1. 生成 V2RayN 标准订阅（base64编码）
          vless_links = []
          for idx, (_, row) in enumerate(df_top.iterrows()):
              ip = str(row.iloc[IP_COL_INDEX])
              country = str(row.iloc[COUNTRY_COL_INDEX]).strip()
              # 节点别名：国家_前缀_序号，可自行调整顺序
              remark = f"{country}_{REMARK_PREFIX}{idx+1}"
              link = (
                  f"vless://{UUID}@{ip}:{PORT}"
                  f"?encryption={ENCRYPTION}&security={'tls' if ENABLE_TLS else 'none'}"
                  f"&sni={HOST}&fp={TLS_FINGERPRINT}&type=ws"
                  f"&host={HOST}&path={quote(WS_PATH)}"
                  f"#{quote(remark)}"
              )
              vless_links.append(link)

          v2ray_full = '\n'.join(vless_links)
          v2ray_b64 = base64.b64encode(v2ray_full.encode('utf-8')).decode('utf-8')
          with open('v2ray.txt', 'w', encoding='utf-8') as f:
              f.write(v2ray_b64)

          # 2. 生成 Clash 标准订阅
          proxies = []
          for idx, (_, row) in enumerate(df_top.iterrows()):
              ip = str(row.iloc[IP_COL_INDEX])
              country = str(row.iloc[COUNTRY_COL_INDEX]).strip()
              remark = f"{country}_{REMARK_PREFIX}{idx+1}"
              proxy = {
                  "name": remark,
                  "type": "vless",
                  "server": ip,
                  "port": PORT,
                  "uuid": UUID,
                  "tls": ENABLE_TLS,
                  "servername": HOST,
                  "network": "ws",
                  "client-fingerprint": TLS_FINGERPRINT,
                  "ws-opts": {
                      "path": WS_PATH,
                      "headers": {"Host": HOST}
                  }
              }
              proxies.append(proxy)

          clash_config = {
              "proxies": proxies,
              "proxy-groups": [{
                  "name": "自动选择",
                  "type": "url-test",
                  "proxies": [p["name"] for p in proxies],
                  "url": "http://www.gstatic.com/generate_204",
                  "interval": 300
              }],
              "rules": ["MATCH,自动选择"]
          }

          with open('clash.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False)

          print(f"成功生成 {len(top_ips)} 个带归属地的最优VLESS节点订阅")
          print(f"节点范围：速度 {df_top.iloc[:, SPEED_COL_INDEX].min():.2f}~{df_top.iloc[:, SPEED_COL_INDEX].max():.2f} Mbps，延迟 {df_top.iloc[:, DELAY_COL_INDEX].min():.2f}~{df_top.iloc[:, DELAY_COL_INDEX].max():.2f} ms")
          EOF
        continue-on-error: true

      - name: 整理发布文件（全容错）
        if: steps.run_script.outcome == 'success'
        run: |
          mkdir -p public
          # 只复制存在的文件，不存在则跳过不报错
          [ -f result.csv ] && cp result.csv public/
          [ -f v2ray.txt ] && cp v2ray.txt public/
          [ -f clash.yaml ] && cp clash.yaml public/
          [ -f index.html ] && cp index.html public/
          echo "发布成功，目录文件清单："
          ls -la public/

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: steps.run_script.outcome == 'success'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "自动更新优选IP与订阅"
