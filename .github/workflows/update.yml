name: Cloudflare IP Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'generate.py'
      - 'requirements.txt'
      - '.github/workflows/*.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: 检出源码
        uses: actions/checkout@v5

      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖（锁定版本，避免升级崩溃）
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas==2.2.2 requests==2.32.3 PyYAML==6.0.1
          fi

      - name: 运行 IP 优选脚本
        id: run_script
        run: python generate.py
        continue-on-error: true

      - name: 生成 V2RayN + Clash 双格式订阅
        if: steps.run_script.outcome == 'success'
        run: |
          python3 << 'EOF'
          import pandas as pd
          import base64
          import json
          import yaml

          df = pd.read_csv('result.csv')
          top_ips = df.iloc[:10, 0].astype(str).tolist()

          # ====================== 请修改为你自己的节点参数 ======================
          UUID = "你的节点UUID"
          PORT = 443
          ALTER_ID = 0
          CIPHER = "auto"
          ENABLE_TLS = True
          HOST = "你的域名，例如 cloudflare.com"
          WS_PATH = "/"
          REMARK_PREFIX = "CF优选_"
          # ===================================================================

          # 1. 生成 V2RayN 标准订阅
          v2ray_links = []
          for idx, ip in enumerate(top_ips):
              remark = f"{REMARK_PREFIX}{idx+1}"
              node = {
                  "v": "2",
                  "ps": remark,
                  "add": ip,
                  "port": str(PORT),
                  "id": UUID,
                  "aid": str(ALTER_ID),
                  "scy": CIPHER,
                  "net": "ws",
                  "type": "none",
                  "host": HOST,
                  "path": WS_PATH,
                  "tls": "tls" if ENABLE_TLS else "none"
              }
              json_str = json.dumps(node, ensure_ascii=False)
              b64_node = base64.b64encode(json_str.encode('utf-8')).decode('utf-8')
              v2ray_links.append(f"vmess://{b64_node}")

          v2ray_full = '\n'.join(v2ray_links)
          v2ray_b64 = base64.b64encode(v2ray_full.encode('utf-8')).decode('utf-8')
          with open('v2ray.txt', 'w', encoding='utf-8') as f:
              f.write(v2ray_b64)

          # 2. 生成 Clash 标准订阅
          proxies = []
          for idx, ip in enumerate(top_ips):
              remark = f"{REMARK_PREFIX}{idx+1}"
              proxy = {
                  "name": remark,
                  "type": "vmess",
                  "server": ip,
                  "port": PORT,
                  "uuid": UUID,
                  "alterId": ALTER_ID,
                  "cipher": CIPHER,
                  "tls": ENABLE_TLS,
                  "servername": HOST,
                  "network": "ws",
                  "ws-opts": {
                      "path": WS_PATH,
                      "headers": {"Host": HOST}
                  }
              }
              proxies.append(proxy)

          clash_config = {
              "proxies": proxies,
              "proxy-groups": [{
                  "name": "自动选择",
                  "type": "url-test",
                  "proxies": [p["name"] for p in proxies],
                  "url": "http://www.gstatic.com/generate_204",
                  "interval": 300
              }],
              "rules": ["MATCH,自动选择"]
          }

          with open('clash.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False)

          print(f"成功生成 {len(top_ips)} 个节点的双格式订阅")
          EOF
        continue-on-error: true

      - name: 整理发布文件
        if: steps.run_script.outcome == 'success'
        run: |
          mkdir -p public
          cp result.csv public/
          cp v2ray.txt public/
          cp clash.yaml public/
          if [ -f index.html ]; then cp index.html public/; fi

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: steps.run_script.outcome == 'success'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "自动更新优选IP与订阅"
