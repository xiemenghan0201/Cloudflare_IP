name: Cloudflare IP Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'generate.py'
      - 'requirements.txt'
      - '.github/workflows/*.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: 检出源码
        uses: actions/checkout@v5

      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖（锁定版本）
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas==2.2.2 requests==2.32.3 PyYAML==6.0.1
          fi

      - name: 运行 IP 优选脚本
        id: run_script
        run: python generate.py
        continue-on-error: true

      - name: 生成 V2RayN + Clash 双格式订阅（VLESS容错版）
        if: steps.run_script.outcome == 'success'
        run: |
          python3 << 'EOF'
          import os
          import pandas as pd
          import base64
          import yaml
          from urllib.parse import quote

          # 校验csv是否存在
          if not os.path.exists("result.csv"):
              print("错误：未生成result.csv，跳过订阅")
              exit(1)

          df = pd.read_csv('result.csv')
          print(f"CSV总行数：{len(df)}，列名：{list(df.columns)}")

          # ========== 适配你的CSV配置区 ==========
          IP_COL_INDEX = 0
          COUNTRY_COL_INDEX = 4
          DELAY_COL_INDEX = 7
          SPEED_COL_INDEX = 3
          OUTPUT_COUNT = 20
          UUID = "0c6857dd-cd86-4e02-870b-2f862baf016e"
          PORT = 443
          ENCRYPTION = "none"
          ENABLE_TLS = True
          HOST = "xiemenghan0201.ccwu.cc"
          WS_PATH = "/"
          TLS_FINGERPRINT = "chrome"
          REMARK_PREFIX = "CF优选_"
          # =====================================================

          # 过滤有效节点
          try:
              df_valid = df[(df.iloc[:, DELAY_COL_INDEX] > 0) & (df.iloc[:, SPEED_COL_INDEX] > 0)]
          except Exception as e:
              print(f"读取延迟/速度列失败：{e}，直接取全部IP")
              df_valid = df

          if len(df_valid) == 0:
              print("无有效测速IP，跳过订阅生成")
              exit(0)

          # 排序取前20
          df_sorted = df_valid.sort_values(by=[SPEED_COL_INDEX, DELAY_COL_INDEX], ascending=[False, True])
          df_top = df_sorted.head(OUTPUT_COUNT)
          top_ips = df_top.iloc[:, IP_COL_INDEX].astype(str).tolist()
          print(f"筛选后有效节点数量：{len(top_ips)}")

          # 生成V2RAY订阅
          vless_links = []
          for idx, (_, row) in enumerate(df_top.iterrows()):
              ip = str(row.iloc[IP_COL_INDEX])
              country = str(row.iloc[COUNTRY_COL_INDEX]).strip()
              remark = f"{country}_{REMARK_PREFIX}{idx+1}"
              link = (
                  f"vless://{UUID}@{ip}:{PORT}"
                  f"?encryption={ENCRYPTION}&security={'tls' if ENABLE_TLS else 'none'}"
                  f"&sni={HOST}&fp={TLS_FINGERPRINT}&type=ws"
                  f"&host={HOST}&path={quote(WS_PATH)}"
                  f"#{quote(remark)}"
              )
              vless_links.append(link)

          v2ray_full = '\n'.join(vless_links)
          v2ray_b64 = base64.b64encode(v2ray_full.encode('utf-8')).decode('utf-8')
          with open('v2ray.txt', 'w', encoding='utf-8') as f:
              f.write(v2ray_b64)
          print("已输出 v2ray.txt")

          # 生成Clash订阅
          proxies = []
          for idx, (_, row) in enumerate(df_top.iterrows()):
              ip = str(row.iloc[IP_COL_INDEX])
              country = str(row.iloc[COUNTRY_COL_INDEX]).strip()
              remark = f"{country}_{REMARK_PREFIX}{idx+1}"
              proxy = {
                  "name": remark,
                  "type": "vless",
                  "server": ip,
                  "port": PORT,
                  "uuid": UUID,
                  "tls": ENABLE_TLS,
                  "servername": HOST,
                  "network": "ws",
                  "client-fingerprint": TLS_FINGERPRINT,
                  "ws-opts": {
                      "path": WS_PATH,
                      "headers": {"Host": HOST}
                  }
              }
              proxies.append(proxy)

          clash_config = {
              "proxies": proxies,
              "proxy-groups": [{
                  "name": "自动选择",
                  "type": "url-test",
                  "proxies": [p["name"] for p in proxies],
                  "url": "https://www.cloudflare.com/cdn-cgi/trace",
                  "interval": 300
              }],
              "rules": ["MATCH,自动选择"]
          }

          with open('clash.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(clash_config, f, allow_unicode=True, sort_keys=False)
          print("已输出 clash.yaml")
          EOF
        continue-on-error: true

      - name: 整理发布文件（带首页index.html，解决404）
        if: steps.run_script.outcome == 'success'
        run: |
          mkdir -p public
          # 生成首页
          cat > public/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <title>CF优选IP订阅</title>
          </head>
          <body>
          <h2>订阅地址</h2>
          <p>V2RayN订阅：<a href="./v2ray.txt">./v2ray.txt</a></p>
          <p>Clash订阅：<a href="./clash.yaml">./clash.yaml</a></p>
          <p>测速原始数据：<a href="./result.csv">./result.csv</a></p>
          </body>
          </html>
          HTML
          # 仅复制存在的文件
          [ -f result.csv ] && cp result.csv public/
          [ -f v2ray.txt ] && cp v2ray.txt public/
          [ -f clash.yaml ] && cp clash.yaml public/
          echo "public目录文件列表："
          ls public/

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: steps.run_script.outcome == 'success'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "自动更新优选IP与订阅"
